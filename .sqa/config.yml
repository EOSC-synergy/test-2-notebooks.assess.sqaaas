config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint_fix
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    gitlab.a.incd.pt/palomoIFCA/test-2-notebooks:
      branch: main
      repo: https://gitlab.a.incd.pt/palomoIFCA/test-2-notebooks
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      gitlab.a.incd.pt/palomoIFCA/test-2-notebooks git:
        commands:
        - /usr/bin/env sh .sqa/script.squirrely-gamboge-barnacle.sh
        container: qc.acc_slimy-carmine-zorse
  QC.Doc:
    repos:
      gitlab.a.incd.pt/palomoIFCA/test-2-notebooks find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.ugly-green-impala.sh
        container: qc.doc_frumpy-thistle-hamster
      gitlab.a.incd.pt/palomoIFCA/test-2-notebooks git:
        commands:
        - /usr/bin/env sh .sqa/script.wheezy-magenta-barracuda.sh
        container: qc.doc_droopy-grey-spitz
      gitlab.a.incd.pt/palomoIFCA/test-2-notebooks markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.baggy-cardinal-numbat.sh
        container: qc.doc_hilly-champagne-birman
  QC.Lic:
    repos:
      gitlab.a.incd.pt/palomoIFCA/test-2-notebooks licensee:
        commands:
        - /usr/bin/env sh .sqa/script.homely-burgundy-reindeer.sh
        container: qc.lic_skimpy-bronze-capuchin
  QC.Sec:
    repos:
      gitlab.a.incd.pt/palomoIFCA/test-2-notebooks bandit:
        commands:
        - /usr/bin/env sh .sqa/script.lanky-gamboge-horse.sh
        container: qc.sec_skinny-tangerine-oriole
  QC.Sty:
    repos:
      gitlab.a.incd.pt/palomoIFCA/test-2-notebooks flake8:
        commands:
        - /usr/bin/env sh .sqa/script.squirrely-indigo-cat.sh
        container: qc.sty_nippy-bistre-bordeaux
      gitlab.a.incd.pt/palomoIFCA/test-2-notebooks jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.goopy-magenta-tapir.sh
        container: qc.sty_stuffy-amaranth-zebra
      gitlab.a.incd.pt/palomoIFCA/test-2-notebooks pynblint.py:
        commands:
        - /usr/bin/env sh .sqa/script.woolly-celadon-audemer.sh
        container: qc.sty_silly-turquoise-millipede
  QC.Uni:
    repos:
      gitlab.a.incd.pt/palomoIFCA/test-2-notebooks pytest:
        commands:
        - /usr/bin/env sh .sqa/script.snoopy-ecru-dugong.sh
        container: qc.uni_zippy-tomato-wildebeest
  QC.Ver:
    repos:
      gitlab.a.incd.pt/palomoIFCA/test-2-notebooks get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.squeaky-apricot-swan.sh
        container: qc.ver_stinky-rust-uguisu
timeout: 5400
